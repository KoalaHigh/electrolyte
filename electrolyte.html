<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f1923; --panel: #162130; --card: #1e2f42; --border: #2a3f55;
    --text: #e8f4ff; --muted: #7a9bbf;
    --strong: #ffdd44; --weak: #ffaa22; --none-col: #90aac8;
    --water: #1a6fa8; --accent: #00c8ff;
    --correct: #22cc77; --wrong: #ff4466;
  }
  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; padding: 12px; gap: 0;
  }
  h1 {
    font-size: 1.3rem; font-weight: 900; color: var(--accent);
    letter-spacing: 2px; text-align: center; margin-bottom: 6px;
    text-shadow: 0 0 20px rgba(0,200,255,0.5);
  }
  .mode-tabs { display: flex; gap: 8px; margin-bottom: 10px; }
  .mode-tab {
    padding: 6px 18px; border-radius: 20px; border: 2px solid var(--border);
    background: var(--panel); color: var(--muted); font-family: inherit;
    font-size: 0.85rem; font-weight: 700; cursor: pointer; transition: all 0.2s;
  }
  .mode-tab.active { background: var(--accent); color: #0f1923; border-color: var(--accent); box-shadow: 0 0 12px rgba(0,200,255,0.4); }

  /* Circuit */
  .circuit-wrap {
    width: 100%; max-width: 480px;
    background: var(--panel); border: 2px solid var(--border);
    border-radius: 16px; padding: 10px; margin-bottom: 10px;
  }
  .circuit-svg { width: 100%; height: 210px; }

  @keyframes glow-strong {
    0%,100% { filter: drop-shadow(0 0 8px #ffe033) drop-shadow(0 0 20px #ffcc00); }
    50% { filter: drop-shadow(0 0 16px #ffe033) drop-shadow(0 0 40px #ffcc00); }
  }
  @keyframes glow-weak {
    0%,100% { filter: drop-shadow(0 0 4px #ff9900); }
    50% { filter: drop-shadow(0 0 10px #ff9900); }
  }
  .bulb-off { fill: #3a4a5a; }
  .bulb-strong { fill: #ffe033; animation: glow-strong 1s ease-in-out infinite; }
  .bulb-weak { fill: #ff9900; animation: glow-weak 1.5s ease-in-out infinite; }
  .wire { stroke: #4a7a9b; stroke-width: 3; fill: none; stroke-linecap: round; stroke-linejoin: round; }
  .electrode-rod { stroke: #7aacbd; stroke-width: 5; stroke-linecap: round; }
  .beaker-outline { fill: rgba(26,111,168,0.15); stroke: #2a8fd4; stroke-width: 2.5; }
  .beaker-water { fill: rgba(26,111,168,0.35); }

  /* Info box */
  .info-box {
    background: var(--card); border: 2px solid var(--border);
    border-radius: 12px; padding: 10px 14px; margin-bottom: 10px;
    width: 100%; max-width: 480px; min-height: 68px; transition: border-color 0.3s;
  }
  .info-box.strong { border-color: var(--strong); }
  .info-box.weak { border-color: var(--weak); }
  .info-box.none { border-color: var(--none-col); }
  .info-title { font-size: 0.95rem; font-weight: 900; margin-bottom: 3px; }
  .info-title.strong { color: var(--strong); }
  .info-title.weak { color: var(--weak); }
  .info-title.none { color: var(--none-col); }
  .info-eq { font-size: 0.8rem; color: #a0c8e8; line-height: 1.6; }
  .info-hint { font-size: 0.78rem; color: var(--muted); font-style: italic; }

  /* Substance grid - all mixed */
  .substance-grid {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 6px; width: 100%; max-width: 480px; margin-bottom: 10px;
  }
  .sub-btn {
    background: #2a3f58; border: 2px solid #4a6a88;
    border-radius: 10px; padding: 8px 4px;
    font-family: inherit; font-size: 0.72rem; font-weight: 700;
    color: #c8e0f4; cursor: pointer; transition: all 0.18s; text-align: center;
  }
  .sub-btn:hover { transform: translateY(-2px); background: #334f6e; color: #e8f4ff; }
  .sub-btn.selected-strong { border-color: var(--strong); background: rgba(255,221,68,0.15); color: var(--strong); box-shadow: 0 0 10px rgba(255,221,68,0.3); transform: translateY(-2px); }
  .sub-btn.selected-weak { border-color: var(--weak); background: rgba(255,170,34,0.15); color: var(--weak); box-shadow: 0 0 10px rgba(255,170,34,0.3); transform: translateY(-2px); }
  .sub-btn.selected-none { border-color: var(--none-col); background: rgba(144,170,200,0.15); color: var(--none-col); box-shadow: 0 0 8px rgba(144,170,200,0.2); transform: translateY(-2px); }

  .controls { display: flex; gap: 8px; width: 100%; max-width: 480px; margin-bottom: 8px; }
  .ctrl-btn {
    flex: 1; padding: 9px; border-radius: 10px; border: 2px solid #ff4466;
    background: var(--panel); color: #ff4466; font-family: inherit;
    font-size: 0.82rem; font-weight: 800; cursor: pointer; transition: all 0.2s;
  }
  .ctrl-btn:hover { background: rgba(255,68,102,0.1); }

  /* Quiz */
  .quiz-wrap { width: 100%; max-width: 480px; }
  .quiz-score {
    display: flex; justify-content: space-between; align-items: center;
    background: var(--panel); border-radius: 10px; padding: 8px 12px;
    font-size: 0.82rem; color: var(--muted); font-weight: 700; margin-bottom: 8px;
  }
  .quiz-score span { color: var(--accent); font-size: 1rem; }
  .quiz-q {
    background: var(--card); border: 2px solid var(--accent);
    border-radius: 14px; padding: 14px; margin-bottom: 10px;
    font-size: 1rem; font-weight: 700; text-align: center; color: var(--accent);
  }
  .quiz-choices { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 10px; }
  .choice-btn {
    padding: 12px 6px; border-radius: 10px; border: 2px solid #4a6a88;
    background: #2a3f58; color: #c8e0f4; font-family: inherit;
    font-size: 0.82rem; font-weight: 700; cursor: pointer; transition: all 0.2s; text-align: center;
  }
  .choice-btn:hover:not(:disabled) { border-color: var(--accent); color: #e8f4ff; }
  .choice-btn.correct { border-color: var(--correct); background: rgba(34,204,119,0.15); color: var(--correct); }
  .choice-btn.wrong { border-color: var(--wrong); background: rgba(255,68,102,0.15); color: var(--wrong); }
  .choice-btn:disabled { cursor: default; }

  .quiz-feedback {
    text-align: center; font-size: 0.85rem; font-weight: 700;
    padding: 8px; border-radius: 8px; margin-bottom: 8px; min-height: 36px;
  }
  .quiz-feedback.correct { color: var(--correct); background: rgba(34,204,119,0.1); }
  .quiz-feedback.wrong { color: var(--wrong); background: rgba(255,68,102,0.1); }

  /* Mini circuit in quiz */
  .quiz-circuit {
    width: 100%; background: var(--panel); border: 2px solid var(--border);
    border-radius: 12px; padding: 8px; margin-bottom: 8px;
    display: none;
  }
  .quiz-circuit.show { display: block; }
  .quiz-circuit svg { width: 100%; height: 160px; }

  .next-btn {
    width: 100%; padding: 10px; border-radius: 10px;
    border: 2px solid var(--accent); background: rgba(0,200,255,0.1);
    color: var(--accent); font-family: inherit; font-size: 0.9rem; font-weight: 800;
    cursor: pointer; transition: all 0.2s;
  }
  .next-btn:hover { background: rgba(0,200,255,0.2); }
  .next-btn:disabled { opacity: 0.4; cursor: default; }
  .result-box {
    text-align: center; padding: 24px; background: var(--card);
    border: 2px solid var(--accent); border-radius: 16px;
  }
  .result-score { font-size: 2.5rem; font-weight: 900; color: var(--strong); }
  .result-msg { font-size: 0.9rem; color: var(--muted); margin-top: 6px; }
  .restart-btn {
    margin-top: 12px; padding: 10px 20px; border-radius: 10px;
    border: 2px solid var(--accent); background: var(--accent);
    color: #0f1923; font-family: inherit; font-size: 0.88rem; font-weight: 900; cursor: pointer; margin: 6px 4px 0;
  }
  .hidden { display: none; }
</style>
</head>
<body>

<h1>⚡ 電解質檢測實驗室</h1>
<div class="mode-tabs">
  <button class="mode-tab active" id="tab-explore" onclick="switchMode('explore')">🔬 自由探索</button>
  <button class="mode-tab" id="tab-quiz" onclick="switchMode('quiz')">🎯 猜猜看</button>
</div>

<!-- EXPLORE MODE -->
<div id="explore-mode">
  <div class="circuit-wrap">
    <svg class="circuit-svg" id="main-circuit" viewBox="0 0 420 200"></svg>
  </div>
  <div class="info-box" id="info-box">
    <div class="info-hint">👆 點選下方任一物質，加入純水中觀察導電情形</div>
  </div>
  <div class="substance-grid" id="substance-grid"></div>
  <div class="controls">
    <button class="ctrl-btn" onclick="resetExplore()">🔄 清空重置</button>
  </div>
</div>

<!-- QUIZ MODE -->
<div id="quiz-mode" class="hidden quiz-wrap">
  <div class="quiz-score">
    <div>第 <span id="q-num">1</span> / 5 題</div>
    <div>答對 <span id="q-score">0</span> 題</div>
  </div>
  <div class="quiz-q" id="quiz-question"></div>
  <div class="quiz-choices" id="quiz-choices"></div>
  <div class="quiz-feedback" id="quiz-feedback"></div>
  <div class="quiz-circuit" id="quiz-circuit">
    <svg id="quiz-circuit-svg" viewBox="0 0 420 150"></svg>
  </div>
  <button class="next-btn" id="next-btn" onclick="nextQuestion()" disabled>下一題 →</button>
</div>

<script>
// ===== DATA =====
const substances = [
  // strong
  { name:'鹽酸', type:'strong', formula:'HCl → H⁺ + Cl⁻', note:'強酸，完全解離' },
  { name:'硫酸', type:'strong', formula:'H₂SO₄ → 2H⁺ + SO₄²⁻', note:'強酸，完全解離' },
  { name:'硝酸', type:'strong', formula:'HNO₃ → H⁺ + NO₃⁻', note:'強酸，完全解離' },
  { name:'氫氧化鈉', type:'strong', formula:'NaOH → Na⁺ + OH⁻', note:'強鹼，完全解離' },
  { name:'氫氧化鈣', type:'strong', formula:'Ca(OH)₂ → Ca²⁺ + 2OH⁻', note:'強鹼，完全解離' },
  { name:'氯化鈉', type:'strong', formula:'NaCl → Na⁺ + Cl⁻', note:'食鹽，完全解離' },
  { name:'硝酸鉀', type:'strong', formula:'KNO₃ → K⁺ + NO₃⁻', note:'完全解離' },
  // weak
  { name:'醋酸', type:'weak', formula:'CH₃COOH ⇌ H⁺ + CH₃COO⁻', note:'弱酸，部份解離' },
  { name:'碳酸', type:'weak', formula:'H₂CO₃ ⇌ H⁺ + HCO₃⁻', note:'弱酸，部份解離' },
  { name:'氨水', type:'weak', formula:'NH₃·H₂O ⇌ NH₄⁺ + OH⁻', note:'弱鹼，部份解離' },
  { name:'碳酸鈉', type:'weak', formula:'Na₂CO₃ ⇌ 2Na⁺ + CO₃²⁻', note:'蘇打，部份解離' },
  { name:'碳酸氫鈉', type:'weak', formula:'NaHCO₃ ⇌ Na⁺ + HCO₃⁻', note:'小蘇打，部份解離' },
  { name:'果汁', type:'weak', formula:'含少量有機酸，部份導電', note:'弱電解質' },
  { name:'礦泉水', type:'weak', formula:'含少量礦物質離子', note:'弱電解質' },
  // none
  { name:'乙醇', type:'none', formula:'C₂H₅OH（不解離）', note:'酒精，非電解質' },
  { name:'甲醇', type:'none', formula:'CH₃OH（不解離）', note:'非電解質' },
  { name:'葡萄糖', type:'none', formula:'C₆H₁₂O₆（不解離）', note:'非電解質' },
  { name:'蔗糖', type:'none', formula:'C₁₂H₂₂O₁₁（不解離）', note:'非電解質' },
  { name:'果糖', type:'none', formula:'C₆H₁₂O₆（不解離）', note:'非電解質' },
  { name:'蒸餾水', type:'none', formula:'H₂O（不解離）', note:'純水，非電解質' },
  { name:'石墨粉', type:'none', formula:'C（不溶於水）', note:'非電解質' },
];

// Shuffle
function shuffle(arr) { return [...arr].sort(() => Math.random()-0.5); }

// ===== DRAW CIRCUIT =====
// svgEl: SVG element, type: 'strong'|'weak'|'none'|null, height: viewBox height
function drawCircuit(svgEl, type, vbH) {
  svgEl.innerHTML = '';
  const W = 420, H = vbH || 200;
  const ns = 'http://www.w3.org/2000/svg';

  function el(tag, attrs) {
    const e = document.createElementNS(ns, tag);
    for (const [k,v] of Object.entries(attrs)) e.setAttribute(k, v);
    return e;
  }
  function line(x1,y1,x2,y2,cls) {
    return el('line',{x1,y1,x2,y2,class: cls||'wire'});
  }
  function rect(x,y,w,h,attrs) {
    return el('rect',{x,y,width:w,height:h,...attrs});
  }
  function text(x,y,str,attrs) {
    const t = el('text',{x,y,'text-anchor':'middle',...attrs});
    t.textContent = str; return t;
  }

  // Layout constants
  const batX=30, batY=60, batW=44, batH=50;
  const bulbCX=210, bulbCY=38, bulbR=24;
  const beakerX=130, beakerY=100, beakerW=160, beakerH=80;
  const wireY_top=22; // top horizontal wire Y
  const elec1X = beakerX+30; // left electrode center-x
  const elec2X = beakerX+beakerW-30; // right electrode center-x
  const elecTopY = beakerY; // electrode top (sits on top edge)
  const elecBotY = beakerY+beakerH-8;
  const wireY_bot = H-18; // bottom horizontal wire Y

  // ---- Wires (complete loop) ----
  // Left side: battery top → top wire → bulb left → top wire → right → battery top
  // Top rail: battery-top-right corner → bulb-left → bulb-right → beaker area

  // Battery left terminal (top) up to wireY_top
  svgEl.appendChild(line(batX+batW/2, batY, batX+batW/2, wireY_top));
  // Top left wire: battery top → bulb left tangent
  svgEl.appendChild(line(batX+batW/2, wireY_top, bulbCX-bulbR, wireY_top));
  // Top right wire: bulb right → right side
  svgEl.appendChild(line(bulbCX+bulbR, wireY_top, W-30, wireY_top));
  // Right side down: top rail → electrode top
  svgEl.appendChild(line(W-30, wireY_top, W-30, wireY_bot));
  // Bottom right: right down → beaker right electrode top connection
  svgEl.appendChild(line(W-30, wireY_bot, elec2X, wireY_bot));
  // Right electrode connecting wire: wireY_bot → elecTopY
  svgEl.appendChild(line(elec2X, wireY_bot, elec2X, elecTopY));

  // Left electrode connecting wire: elecTopY → wireY_bot left
  svgEl.appendChild(line(elec1X, elecTopY, elec1X, wireY_bot));
  // Bottom left wire
  svgEl.appendChild(line(elec1X, wireY_bot, batX+batW/2, wireY_bot));
  // Battery bottom terminal
  svgEl.appendChild(line(batX+batW/2, wireY_bot, batX+batW/2, batY+batH));

  // ---- Battery ----
  svgEl.appendChild(rect(batX, batY, batW, batH, {rx:'6', class:'', fill:'#2a4a6a', stroke:'#4a7a9b', 'stroke-width':'1.5'}));
  svgEl.appendChild(text(batX+batW/2, batY+22, '🔋', {'font-size':'13'}));
  svgEl.appendChild(text(batX+batW/2, batY+38, '電池', {'font-size':'9', fill:'#aaa'}));
  // + - signs
  svgEl.appendChild(text(batX+batW/2, batY-4, '+', {'font-size':'10', fill:'#ffdd44'}));
  svgEl.appendChild(text(batX+batW/2, batY+batH+10, '－', {'font-size':'10', fill:'#aaa'}));

  // ---- Bulb ----
  const bulbType = type === 'strong' ? 'bulb-strong' : type === 'weak' ? 'bulb-weak' : 'bulb-off';
  const bulbFill = type === 'strong' ? '#ffe033' : type === 'weak' ? '#ff9900' : '#3a4a5a';
  const bulbEl = el('ellipse',{cx:bulbCX, cy:bulbCY, rx:bulbR, ry:bulbR, class: bulbType, fill: bulbFill});
  svgEl.appendChild(bulbEl);
  // Bulb base
  svgEl.appendChild(rect(bulbCX-8, bulbCY+bulbR-2, 16, 8, {rx:'3', fill:'#445566'}));
  svgEl.appendChild(line(bulbCX-6, bulbCY+bulbR+6, bulbCX-6, wireY_top, 'wire'));
  svgEl.appendChild(line(bulbCX+6, bulbCY+bulbR+6, bulbCX+6, wireY_top, 'wire'));
  // Filament (decorative)
  const fil = el('polyline',{points:`${bulbCX-8},${bulbCY} ${bulbCX-4},${bulbCY-6} ${bulbCX},${bulbCY} ${bulbCX+4},${bulbCY-6} ${bulbCX+8},${bulbCY}`, fill:'none', stroke: type==='strong'?'#fff':type==='weak'?'#ffe':'#667788', 'stroke-width':'1.5'});
  svgEl.appendChild(fil);
  // Glow halo for strong
  if (type === 'strong') {
    const halo = el('ellipse',{cx:bulbCX, cy:bulbCY, rx:bulbR+6, ry:bulbR+6, fill:'rgba(255,240,100,0.12)'});
    svgEl.appendChild(halo);
  }
  svgEl.appendChild(text(bulbCX, bulbCY+bulbR+20, '燈泡', {'font-size':'9', fill:'#7a9bbf'}));

  // ---- Beaker (rectangle) ----
  // Water fill
  const waterFill = rect(beakerX+2, beakerY+20, beakerW-4, beakerH-22, {fill:'rgba(26,111,168,0.35)'});
  svgEl.appendChild(waterFill);
  // Beaker body
  svgEl.appendChild(rect(beakerX, beakerY, beakerW, beakerH, {rx:'4', fill:'rgba(26,111,168,0.1)', stroke:'#2a8fd4', 'stroke-width':'2.5', class:''}));
  // Beaker label
  const bkLabel = type ? (type==='strong'?'強電解質水溶液':type==='weak'?'弱電解質水溶液':'非電解質水溶液') : '純水';
  svgEl.appendChild(text(beakerX+beakerW/2, beakerY+beakerH+14, bkLabel, {'font-size':'9', fill:'#4a8aaa'}));

  // ---- Electrodes (from top, don't go through beaker wall) ----
  // Left electrode: from wireY_bot down into water
  const e1 = el('line',{x1:elec1X, y1:elecTopY, x2:elec1X, y2:elecBotY, class:'electrode-rod'});
  svgEl.appendChild(e1);
  svgEl.appendChild(text(elec1X, elecTopY-4, '－', {'font-size':'9', fill:'#7aacbd'}));

  // Right electrode
  const e2 = el('line',{x1:elec2X, y1:elecTopY, x2:elec2X, y2:elecBotY, class:'electrode-rod'});
  svgEl.appendChild(e2);
  svgEl.appendChild(text(elec2X, elecTopY-4, '+', {'font-size':'9', fill:'#7aacbd'}));
}

// ===== EXPLORE =====
let selectedIdx = null;

function buildExplore() {
  const grid = document.getElementById('substance-grid');
  grid.innerHTML = '';
  // Shuffled display
  const shuffled = shuffle(substances.map((_,i)=>i));
  shuffled.forEach(idx => {
    const s = substances[idx];
    const btn = document.createElement('button');
    btn.className = 'sub-btn';
    btn.id = `sub-${idx}`;
    btn.textContent = s.name;
    btn.onclick = () => selectSub(idx);
    grid.appendChild(btn);
  });
  drawCircuit(document.getElementById('main-circuit'), null, 200);
}

function selectSub(idx) {
  if (selectedIdx !== null) {
    const old = document.getElementById(`sub-${selectedIdx}`);
    if (old) old.className = 'sub-btn';
  }
  selectedIdx = idx;
  const s = substances[idx];
  const btn = document.getElementById(`sub-${idx}`);
  btn.className = `sub-btn selected-${s.type}`;
  drawCircuit(document.getElementById('main-circuit'), s.type, 200);
  updateInfo(s);
}

function updateInfo(s) {
  const typeLabels = { strong:'強電解質 — 在水中完全解離', weak:'弱電解質 — 在水中部份解離', none:'非電解質 — 在水中無法解離' };
  const box = document.getElementById('info-box');
  box.className = `info-box ${s.type === 'none' ? 'none' : s.type}`;
  box.innerHTML = `
    <div class="info-title ${s.type === 'none' ? 'none' : s.type}">${typeLabels[s.type]}</div>
    <div class="info-eq">${s.formula}</div>
    <div class="info-hint" style="margin-top:3px">${s.note}</div>
  `;
}

function resetExplore() {
  if (selectedIdx !== null) {
    const old = document.getElementById(`sub-${selectedIdx}`);
    if (old) old.className = 'sub-btn';
    selectedIdx = null;
  }
  drawCircuit(document.getElementById('main-circuit'), null, 200);
  const box = document.getElementById('info-box');
  box.className = 'info-box';
  box.innerHTML = '<div class="info-hint">👆 點選下方任一物質，加入純水中觀察導電情形</div>';
}

// ===== QUIZ =====
let quizQ = [], quizIdx = 0, quizScore = 0, quizAnswered = false;

function initQuiz() {
  quizQ = shuffle(substances).slice(0, 5);
  quizIdx = 0; quizScore = 0; quizAnswered = false;
  document.getElementById('q-score').textContent = 0;
  document.getElementById('quiz-feedback').textContent = '';
  document.getElementById('quiz-feedback').className = 'quiz-feedback';
  document.getElementById('quiz-circuit').classList.remove('show');
  renderQuizQ();
}

function renderQuizQ() {
  if (quizIdx >= 5) { showResult(); return; }
  const q = quizQ[quizIdx];
  document.getElementById('q-num').textContent = quizIdx + 1;
  document.getElementById('quiz-question').textContent = `「${q.name}」是哪種電解質？`;
  document.getElementById('next-btn').disabled = true;
  document.getElementById('quiz-feedback').textContent = '';
  document.getElementById('quiz-feedback').className = 'quiz-feedback';
  document.getElementById('quiz-circuit').classList.remove('show');
  quizAnswered = false;

  const opts = shuffle(['strong','weak','none']);
  const labels = { strong:'⚡ 強電解質', weak:'💡 弱電解質', none:'⭕ 非電解質' };
  const container = document.getElementById('quiz-choices');
  container.innerHTML = '';
  opts.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = labels[opt];
    btn.onclick = () => quizAnswer(opt, q);
    container.appendChild(btn);
  });
}

function quizAnswer(chosen, q) {
  if (quizAnswered) return;
  quizAnswered = true;
  document.getElementById('next-btn').disabled = false;
  const labels = { strong:'⚡ 強電解質', weak:'💡 弱電解質', none:'⭕ 非電解質' };
  document.querySelectorAll('.choice-btn').forEach(b => {
    b.disabled = true;
    const bType = Object.keys(labels).find(k => labels[k] === b.textContent);
    if (bType === q.type) b.classList.add('correct');
    else if (bType === chosen && chosen !== q.type) b.classList.add('wrong');
  });

  const fb = document.getElementById('quiz-feedback');
  const typeNames = { strong:'強電解質', weak:'弱電解質', none:'非電解質' };
  if (chosen === q.type) {
    quizScore++;
    document.getElementById('q-score').textContent = quizScore;
    fb.className = 'quiz-feedback correct';
    fb.textContent = `✅ 答對了！${q.formula}`;
  } else {
    fb.className = 'quiz-feedback wrong';
    fb.textContent = `❌ 答錯！「${q.name}」是${typeNames[q.type]}。${q.note}`;
  }

  // Show mini circuit
  document.getElementById('quiz-circuit').classList.add('show');
  drawCircuit(document.getElementById('quiz-circuit-svg'), q.type, 150);
}

function nextQuestion() {
  quizIdx++;
  renderQuizQ();
}

function showResult() {
  const msgs = ['再多練習！', '還可以更好！', '答得不錯！', '很厲害！', '全對！電解質達人！'];
  const msg = msgs[Math.min(quizScore, 4)];
  document.getElementById('quiz-mode').innerHTML = `
    <div class="result-box">
      <div style="font-size:2rem">🧪</div>
      <div class="result-score">${quizScore} / 5</div>
      <div class="result-msg">${msg}</div>
      <div style="margin-top:10px">
        <button class="restart-btn" onclick="initQuiz()">再試一次</button>
        <button class="restart-btn" style="background:var(--panel);color:var(--accent);border-color:var(--accent)" onclick="switchMode('explore')">回探索模式</button>
      </div>
    </div>
  `;
}

// ===== MODE SWITCH =====
function switchMode(mode) {
  document.getElementById('tab-explore').classList.toggle('active', mode==='explore');
  document.getElementById('tab-quiz').classList.toggle('active', mode==='quiz');
  document.getElementById('explore-mode').classList.toggle('hidden', mode!=='explore');

  const qm = document.getElementById('quiz-mode');
  if (mode === 'quiz') {
    qm.classList.remove('hidden');
    // Restore quiz HTML if result was shown
    qm.innerHTML = `
      <div class="quiz-score">
        <div>第 <span id="q-num">1</span> / 5 題</div>
        <div>答對 <span id="q-score">0</span> 題</div>
      </div>
      <div class="quiz-q" id="quiz-question"></div>
      <div class="quiz-choices" id="quiz-choices"></div>
      <div class="quiz-feedback" id="quiz-feedback"></div>
      <div class="quiz-circuit" id="quiz-circuit">
        <svg id="quiz-circuit-svg" viewBox="0 0 420 150"></svg>
      </div>
      <button class="next-btn" id="next-btn" onclick="nextQuestion()" disabled>下一題 →</button>
    `;
    initQuiz();
  } else {
    qm.classList.add('hidden');
    resetExplore();
  }
}

// ===== INIT =====
buildExplore();
</script>
